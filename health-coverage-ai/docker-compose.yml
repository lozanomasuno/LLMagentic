services:
  postgres:
    image: postgres:16-alpine
    container_name: health_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - health_network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: health_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    environment:
      ALLOW_RESET: "true"
      ANONYMIZED_TELEMETRY: "false"
    networks:
      - health_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production

    container_name: health_backend

    volumes:
     - ./backend:/app
     - ./data:/app/data
   
    env_file: 
     - .env

    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - health_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: health_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - health_network
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:

networks:
  health_network:
    driver: bridge
